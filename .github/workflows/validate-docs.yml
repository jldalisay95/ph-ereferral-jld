# Modified to follow linear build pattern from PH Core IG

name: Build PH eReferral FHIR IG

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "Checking branch name: $BRANCH_NAME"

          # Check for forward slash
          if echo "$BRANCH_NAME" | grep -q '/'; then
            echo "::error::Branch name contains '/'. Use hyphens instead."
            exit 1
          fi

          # Check for other invalid characters
          if echo "$BRANCH_NAME" | grep -qE '[\\~^:\[\] ]'; then
            echo "::error::Branch name contains invalid special characters."
            exit 1
          fi

          echo "Branch name validation passed"

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          sudo gem install jekyll
          sudo npm install -g fsh-sushi

      - name: Build IG
        run: |
          chmod +x ./_updatePublisher.sh
          ./_updatePublisher.sh -y
          chmod +x ./_genonce.sh
          ./_genonce.sh

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: |
            output/qa.html
            output/qa.json
            output/qa.min.html
            output/qa-txservers.html
            output/qa-dep.html
            output/qa-ipreview.html
          if-no-files-found: ignore

      - name: QA Gate
        run: |
          if [ ! -f output/qa.json ]; then
            echo "::error::No qa.json found"
            exit 1
          fi

          ERRORS=$(jq -r '.errs // 0' output/qa.json)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::QA errors found: $ERRORS"
            echo "::group::QA error details"
            if [ -f output/qa.min.html ]; then
              sed -e 's/<[^>]*>/ /g' -e 's/&nbsp;/ /g' output/qa.min.html \
                | tr '\n' ' ' \
                | sed -e 's/[[:space:]][[:space:]]*/ /g' \
                | cut -c 1-12000
            elif [ -f output/qa.html ]; then
              grep -n "<b>error</b>" output/qa.html || true
            fi
            echo
            echo "::endgroup::"
            exit 1
          fi

          echo "QA passed: $ERRORS errors"

      - name: Deploy to GitHub Pages
        if: success() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./output
          force_orphan: true
          commit_message: "Deploy IG - ${{ github.sha }}"
